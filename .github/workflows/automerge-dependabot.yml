name: Dependabot Auto-Merge

on:
  pull_request_target:

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # github-actions bumps (incl. major) are CI-gated by the PR's own test run
      # and owned by Dependabot — auto-merge them all. npm majors stay gated
      # (manual / pre-release.py review) because breaking changes are real there.
      - name: Auto-merge non-major updates, plus all github-actions updates
        if: >
          steps.metadata.outputs.update-type != 'version-update:semver-major' ||
          steps.metadata.outputs.package-ecosystem == 'github_actions'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
