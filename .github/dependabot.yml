# Dependabot configuration
# Cooldown delays updating normal npm dependencies by 7 days but allows security updates to be processed immediately.
# Note: Cooldown is not supported for the github-actions ecosystem.
# Reference: https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
    open-pull-requests-limit: 15
    assignees:
      - 'krobipd'
    versioning-strategy: 'increase'
    cooldown:
      default-days: 7
    ignore:
      # @types/node must track engines.node (>=20). Block major bumps so
      # type defs cannot drift ahead of the supported runtime range.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      # typescript pinned to ~5.9.x because @iobroker/eslint-config@2 ships
      # typescript-eslint@8 which requires TS ~5.x. Bump only when eslint-config
      # adds TS 6 support.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      # eslint pinned to v9 because @iobroker/eslint-config@2 expects v9 API.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
    open-pull-requests-limit: 15
    assignees:
      - 'krobipd'
